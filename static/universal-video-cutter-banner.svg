<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Universal Video Cutter banner">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0E13"/>
      <stop offset="100%" stop-color="#10161D"/>
    </linearGradient>

    <radialGradient id="titleGlow" cx="22%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#36E2C5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#36E2C5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F2F7F8"/>
      <stop offset="100%" stop-color="#C4DBE0"/>
    </linearGradient>

    <linearGradient id="cutRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36E2C5"/>
      <stop offset="100%" stop-color="#FF8A3D"/>
    </linearGradient>

    <linearGradient id="bladeHalo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A3D" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF8A3D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF8A3D" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="trackFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10161D" stop-opacity="1"/>
      <stop offset="6%" stop-color="#10161D" stop-opacity="0"/>
      <stop offset="94%" stop-color="#10161D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#10161D" stop-opacity="1"/>
    </linearGradient>

    <filter id="softGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="300" rx="14"/>
    </clipPath>
  </defs>

  <style>
    .bar {
      animation: sliceDip 6.0s linear infinite;
      transform-box: fill-box;
    }
    .blade {
      animation: bladeSweep 6.0s linear infinite;
    }
    @keyframes sliceDip {
      0%   { transform: scaleY(0.12); filter: brightness(2.4); }
      6%   { transform: scaleY(1.22); filter: brightness(1.3); }
      13%  { transform: scaleY(1);    filter: brightness(1);   }
      100% { transform: scaleY(1);    filter: brightness(1);   }
    }
    @keyframes bladeSweep {
      0%   { transform: translateX(0);          opacity: 0; }
      4%   { opacity: 1; }
      96%  { opacity: 1; }
      100% { transform: translateX(1060px); opacity: 0; }
    }
    .title {
      font-family: "JetBrains Mono","IBM Plex Mono","SFMono-Regular",Consolas,monospace;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .tagline {
      font-family: -apple-system,"Inter","Segoe UI",sans-serif;
      font-weight: 400;
      letter-spacing: 0.2px;
    }
    .stack {
      font-family: "JetBrains Mono","SFMono-Regular",Consolas,monospace;
      letter-spacing: 0.6px;
    }
  </style>

  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="1200" height="300" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="1200" height="300" fill="url(#titleGlow)"/>

    <!-- Title block -->
    <text x="70" y="118" class="title" font-size="42" fill="url(#titleFill)">Universal Video Cutter</text>
    <text x="70" y="148" class="tagline" font-size="16" fill="#7C8A99">lossless cuts &#183; hardware-accelerated transcodes &#183; sandboxed by design</text>
    <rect x="70" y="162" width="92" height="3" rx="1.5" fill="url(#cutRule)"/>

    <!-- Waveform / blade signature -->
    <g>
      <rect x="74.14" y="204.42" width="8.28" height="41.16" rx="2" fill="#36E2C5" fill-opacity="0.69" transform-origin="78.28px 225px" style="animation-delay:0.023s" class="bar"/>
      <rect x="90.7" y="198.54" width="8.28" height="52.92" rx="2" fill="#36E2C5" fill-opacity="0.75" transform-origin="94.84px 225px" style="animation-delay:0.117s" class="bar"/>
